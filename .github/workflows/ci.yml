name: Continuous Integration
on:
  push: { branches: [main, develop] }
  pull_request: { branches: [main, develop] }

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with: { fetch-depth: 1 }

      - name: Setup Node.js
        uses: ./.github/actions/setup
        with: { node-version: "24" }

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with: { fetch-depth: 1 }

      - name: Setup Node.js
        uses: ./.github/actions/setup
        with: { node-version: "24" }

      - name: Run Unit Tests
        run: pnpm test

  build:
    name: Build
    needs: [lint, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with: { fetch-depth: 1 }

      - name: Setup Node.js
        uses: ./.github/actions/setup
        with: { node-version: "24" }

      - name: Build
        run: pnpm build

      - name: Get Version
        id: version
        run: |
          echo "version=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
