name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "24.x"

jobs:
  # ============================================================================
  # SETUP and LINT
  # ============================================================================

  setup:
    name: Setup and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint
        continue-on-error: false

      - name: Type check
        run: pnpm type-check
        continue-on-error: false

      - name: Format check
        run: pnpm check
        continue-on-error: false

  # ============================================================================
  # PRIORITY 0 & 1: UNIT AND INTEGRATION TESTS
  # ============================================================================

  unit-integration:
    name: Unit & Integration Tests (P1)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test -- --run
        env:
          CI: true

      - name: Generate coverage report
        run: pnpm test -- --coverage --run
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Test Audit
        run: |
          echo "[TEST-AUDIT] P1 Unit/Integration: PASS"

  # ============================================================================
  # PRIORITY 0: END-TO-END TESTS
  # ============================================================================

  e2e:
    name: End-to-End Tests (P0)
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Build application
        run: pnpm build
        env:
          CI: true

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Test Audit
        run: |
          echo "[TEST-AUDIT] P0 End-to-End: PASS"

  # ============================================================================
  # PRIORITY 2: API AND SECURITY TESTS
  # ============================================================================

  api-security:
    name: API & Security Tests (P2)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API endpoint tests
        run: pnpm test tests/api/endpoints.test.ts -- --run
        env:
          CI: true

      - name: Run security tests
        run: pnpm test tests/api/security.test.ts -- --run
        env:
          CI: true

      - name: Run email notification tests
        run: pnpm test tests/api/email.test.ts -- --run
        env:
          CI: true

      - name: Test Audit
        run: |
          echo "[TEST-AUDIT] P2 API/Security: PASS"

  # ============================================================================
  # PRIORITY 3: ACCESSIBILITY TESTS (OPTIONAL)
  # ============================================================================

  accessibility:
    name: Accessibility Audit (P3 - Optional)
    runs-on: ubuntu-latest
    needs: setup
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Build application
        run: pnpm build

      - name: Run accessibility audit
        run: pnpm exec playwright test e2e/accessibility.spec.ts --project=chromium
        env:
          CI: true

      - name: Run performance audit
        run: pnpm exec playwright test e2e/performance.spec.ts --project=chromium
        env:
          CI: true

      - name: Run visual regression tests
        run: pnpm exec playwright test e2e/visual-regression.spec.ts --project=chromium
        env:
          CI: true

      - name: Test Audit
        if: success()
        run: |
          echo "[TEST-AUDIT] P3 Accessibility/Performance/Visual: PASS"

  # ============================================================================
  # PRIORITY 4: EDGE CASE TESTS (OPTIONAL)
  # ============================================================================

  edge-cases:
    name: Edge Case Tests (P4 - Optional)
    runs-on: ubuntu-latest
    needs: unit-integration
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run edge case tests
        run: pnpm test tests/edge-cases/edge-cases.test.tsx -- --run
        env:
          CI: true

      - name: Test Audit
        if: success()
        run: |
          echo "[TEST-AUDIT] P4 Edge Cases: PASS"

  # ============================================================================
  # BUILD VERIFICATION
  # ============================================================================

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [setup, unit-integration]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build
        env:
          CI: true

      - name: Verify build output
        run: |
          if [ -d ".next" ]; then
            echo "Build successful: .next directory exists"
            du -sh .next
          else
            echo "Build failed: .next directory not found"
            exit 1
          fi

  # ============================================================================
  # FINAL STATUS AND REPORT
  # ============================================================================

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [setup, unit-integration, e2e, api-security, build]
    if: always()
    steps:
      - name: Determine overall status
        run: |
          echo "==================================="
          echo "TEST EXECUTION SUMMARY"
          echo "==================================="
          echo "[TEST-AUDIT] Setup: PASS"
          echo "[TEST-AUDIT] P1 Unit/Integration: ${{ needs.unit-integration.result == 'success' && 'PASS' || 'FAIL' }}"
          echo "[TEST-AUDIT] P0 End-to-End: ${{ needs.e2e.result == 'success' && 'PASS' || 'FAIL' }}"
          echo "[TEST-AUDIT] P2 API/Security: ${{ needs.api-security.result == 'success' && 'PASS' || 'FAIL' }}"
          echo "[TEST-AUDIT] Build: ${{ needs.build.result == 'success' && 'PASS' || 'FAIL' }}"
          echo "==================================="

      - name: Fail if critical tests failed
        if: |
          needs.unit-integration.result != 'success' ||
          needs.e2e.result != 'success' ||
          needs.api-security.result != 'success' ||
          needs.build.result != 'success'
        run: |
          echo "Critical tests failed!"
          exit 1

      - name: Success message
        if: success()
        run: |
          echo "✅ All tests passed successfully!"
          echo "Ready to merge!"
