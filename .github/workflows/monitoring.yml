name: Nightly Monitoring
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with: { fetch-depth: 1 }

      - name: Setup Node.js
        uses: ./.github/actions/setup
        with: { node-version: "24" }

      - name: Run Linting
        run: pnpm lint --max-warnings=0

      - name: Run Type Checking
        run: pnpm type-check

      - name: Run Code Check
        run: pnpm check

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with: { fetch-depth: 1 }

      - name: Setup Node.js
        uses: ./.github/actions/setup
        with: { node-version: "24" }

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps

      - name: Build
        run: pnpm build

      - name: Run E2E Tests
        run: pnpm exec playwright test --project=${{matrix.project}} --shard=${{matrix.shardIndex}}/${{matrix.shardTotal}}

      - name: Upload Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: nightly-report-${{matrix.project}}-${{matrix.shardIndex}}
          path: playwright-report/

  performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with: { fetch-depth: 1 }

      - name: Setup Node.js
        uses: ./.github/actions/setup
        with: { node-version: "24" }

      - name: Build
        run: pnpm build

      - name: Check Bundle Size
        run: du -sh .next/static/ # Check bundle size

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with: { fetch-depth: 1 }

      - name: Setup Node.js
        uses: ./.github/actions/setup
        with: { node-version: "24" }

      - name: Run Security Audit
        run: pnpm audit --production

  monitoring-report:
    runs-on: ubuntu-latest
    needs: [code-quality, e2e, performance, security-audit]
    if: always()
    steps:
      - run: |
          echo "Lint/Type: ${{ needs.code-quality.result }}"
          echo "E2E: ${{ needs.e2e.result }}"
          echo "Bundle size: ${{ needs.performance.result }}"
          echo "Audit: ${{ needs.security-audit.result }}"
