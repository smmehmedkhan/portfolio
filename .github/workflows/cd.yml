name: Continuous Deployment

on:
  workflow_run:
    workflows: [ "Validation" ]
    types: [ completed ]
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch ||
    github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  deployments: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}
      VERCEL_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          node-version: "24"

      - name: Pull Vercel Environment
        run: pnpm dlx vercel@latest pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build Project Artifacts
        run: pnpm dlx vercel@latest build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        id: vercel
        run: |
          DEPLOYMENT_URL=$(pnpm dlx vercel@latest deploy --prebuilt --archive=tgz --prod --token=$VERCEL_TOKEN)
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Setup BuildX
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: smmehmedkhan/portfolio
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.event.workflow_run.head_sha }}
          name: Release ${{ github.event.workflow_run.head_sha }}
          generate_release_notes: true
